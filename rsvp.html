<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSVP | XV Chloe-Ann Rivera</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2d2527;
      --muted: #75696c;
      --rose: #9f5f70;
      --rose-dark: #734251;
      --paper: rgba(255, 255, 255, 0.92);
      --line: rgba(115, 66, 81, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(255, 248, 250, 0.75), rgba(255, 248, 250, 0.75)),
        url("assets/images/rivera-03.jpg") center / cover fixed;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 440px);
      padding: 30px 24px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(45, 37, 39, 0.24);
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--rose-dark);
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--rose-dark);
      font-size: clamp(42px, 14vw, 72px);
      font-weight: 400;
      line-height: 0.95;
    }

    .guest {
      min-height: 24px;
      margin: 18px 0 0;
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 16px;
    }

    .question {
      margin: 22px 0 18px;
      font-size: 24px;
      line-height: 1.2;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    button,
    .back-link {
      width: 100%;
      min-height: 48px;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    button {
      border: 1px solid transparent;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .attending {
      background: var(--rose-dark);
    }

    .declined {
      background: #6f7471;
    }

    .status {
      min-height: 24px;
      margin: 18px 0 0;
      color: var(--rose-dark);
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .back-link {
      display: inline-grid;
      place-items: center;
      margin-top: 14px;
      border: 1px solid var(--line);
      color: var(--rose-dark);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main>
    <p class="eyebrow">XV Chloe-Ann Rivera</p>
    <h1>RSVP</h1>
    <p id="guestName" class="guest">Loading invitation...</p>
    <p class="question">Will you attend the XV?</p>

    <div class="actions">
      <button class="attending" type="button" data-action="confirm">Attending</button>
      <button class="declined" type="button" data-action="decline">Not Attending</button>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>
    <a id="backLink" class="back-link" href="index.html">Back to Invitation</a>
  </main>

  <script src="guest-api-config.js"></script>
  <script src="rsvp.js"></script>
</body>

</html>
